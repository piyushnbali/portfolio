<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piyush Bali — Terminal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap');

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root {
      --bg: #0a0e14;
      --panel: #0d1117;
      --border: #1e2a3a;
      --green: #00ff9c;
      --cyan: #00e5ff;
      --yellow: #ffd600;
      --orange: #ff9100;
      --red: #ff5252;
      --purple: #c792ea;
      --dim: #3b4f6b;
      --text: #c5d1de;
      --white: #e6edf3;
    }

    html { font-size: 14px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* Terminal Window */
    .terminal {
      width: 100%;
      max-width: 920px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.6), 0 0 40px rgba(0,255,156,.04);
    }

    /* Title bar */
    .title-bar {
      background: #161b22;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      user-select: none;
    }
    .title-bar .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.r { background: #ff5f57; }
    .dot.y { background: #febc2e; }
    .dot.g { background: #28c840; }
    .title-bar .title {
      flex: 1;
      text-align: center;
      color: var(--dim);
      font-size: .8rem;
    }

    /* Output area */
    .output {
      padding: 20px;
      max-height: 72vh;
      overflow-y: auto;
      line-height: 1.7;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .output::-webkit-scrollbar { width: 6px; }
    .output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Prompt line */
    .prompt-line {
      display: flex;
      align-items: center;
      padding: 8px 20px 16px;
      border-top: 1px solid var(--border);
      gap: 0;
    }
    .prompt-prefix {
      color: var(--green);
      white-space: nowrap;
    }
    .prompt-path { color: var(--cyan); white-space: nowrap; }
    .prompt-symbol { color: var(--yellow); margin: 0 6px; }
    #input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--white);
      font-family: inherit;
      font-size: 1rem;
      caret-color: var(--green);
    }

    /* Styling helpers */
    .g { color: var(--green); }
    .c { color: var(--cyan); }
    .y { color: var(--yellow); }
    .o { color: var(--orange); }
    .r { color: var(--red); }
    .p { color: var(--purple); }
    .d { color: var(--dim); }
    .w { color: var(--white); font-weight: 600; }
    .b { font-weight: 600; }

    .line { margin-bottom: 2px; }
    .block { margin: 8px 0; }
    .cmd-echo { color: var(--dim); margin-bottom: 8px; }

    .section-title {
      color: var(--yellow);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
      margin: 12px 0 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: .85rem;
    }

    .job { margin-bottom: 16px; }
    .job-header { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
    .job-title { color: var(--green); font-weight: 600; }
    .job-date { color: var(--dim); font-size: .85rem; }
    .job-company { color: var(--cyan); font-size: .9rem; }
    .job ul { margin: 6px 0 0 18px; }
    .job li { color: var(--text); margin-bottom: 3px; font-size: .9rem; }
    .job li::marker { color: var(--dim); }

    .skill-cat { color: var(--orange); font-weight: 600; }
    .skill-items { color: var(--text); }

    .tag {
      display: inline-block;
      background: rgba(0,255,156,.08);
      color: var(--green);
      padding: 2px 10px;
      border-radius: 4px;
      margin: 2px 4px 2px 0;
      font-size: .85rem;
      border: 1px solid rgba(0,255,156,.15);
    }

    a { color: var(--cyan); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ASCII banner */
    .ascii {
      color: var(--green);
      line-height: 1.15;
      font-size: .65rem;
      margin-bottom: 8px;
    }

    /* Typing cursor for welcome */
    .cursor {
      display: inline-block;
      width: 8px;
      height: 1.1em;
      background: var(--green);
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .help-grid {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 2px 12px;
      margin: 4px 0;
    }
    .help-cmd { color: var(--green); }
    .help-desc { color: var(--text); }

    .stat { display: flex; gap: 8px; margin: 2px 0; }
    .stat-val { color: var(--green); font-weight: 600; min-width: 80px; }
    .stat-label { color: var(--text); }

    /* LeetCode styles */
    .lc-card { margin: 8px 0; }
    .lc-total { font-size: 1.6rem; font-weight: 600; color: var(--green); }
    .lc-total-label { color: var(--dim); font-size: .85rem; }
    .lc-bar-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
    .lc-bar-label { min-width: 70px; font-weight: 600; font-size: .85rem; }
    .lc-bar-track { flex: 1; height: 14px; background: rgba(255,255,255,.06); border-radius: 3px; overflow: hidden; position: relative; }
    .lc-bar-fill { height: 100%; border-radius: 3px; transition: width .6s ease; }
    .lc-bar-count { min-width: 80px; text-align: right; font-size: .85rem; color: var(--text); }
    .lc-ranking { margin-top: 10px; color: var(--dim); font-size: .85rem; }

    @media (max-width: 600px) {
      html { font-size: 12px; }
      .output { max-height: 65vh; padding: 12px; }
      .ascii { font-size: .5rem; }
      .job-header { flex-direction: column; }
      .help-grid { grid-template-columns: 110px 1fr; }
    }
  </style>
</head>
<body>

function cmdLeetcode() {
  const containerId = 'lc-' + Date.now();
  // Show loading state immediately
  setTimeout(() => fetchLeetCode(containerId), 0);
  return `
<div class="section-title">LeetCode — <a href="https://leetcode.com/u/piyushnbali" target="_blank">piyushnbali</a></div>
<div id="${containerId}">
  <span class="d">Fetching stats from LeetCode API...</span>
</div>`;
}

function fetchLeetCode(containerId) {
  const query = JSON.stringify({
    query: `query {
      matchedUser(username: "piyushnbali") {
        submitStatsGlobal { acSubmissionNum { difficulty count } }
        profile { ranking reputation }
      }
      allQuestionsCount { difficulty count }
    }`
  });

  fetch(LC_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: query
  })
  .then(r => r.json())
  .then(data => {
    const user = data.data.matchedUser;
    const total = data.data.allQuestionsCount;
    const solved = user.submitStatsGlobal.acSubmissionNum;
    const ranking = user.profile.ranking;

    const get = (arr, d) => (arr.find(x => x.difficulty === d) || { count: 0 }).count;

    const all   = get(solved, 'All');
    const easy  = get(solved, 'Easy');
    const med   = get(solved, 'Medium');
    const hard  = get(solved, 'Hard');
    const tEasy = get(total, 'Easy');
    const tMed  = get(total, 'Medium');
    const tHard = get(total, 'Hard');
    const tAll  = get(total, 'All');

    const pctE = ((easy / tEasy) * 100).toFixed(1);
    const pctM = ((med / tMed) * 100).toFixed(1);
    const pctH = ((hard / tHard) * 100).toFixed(1);

    const el = document.getElementById(containerId);
    if (!el) return;
    el.innerHTML = `
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
        <div>
          <span class="lc-total">${all}</span>
          <span class="lc-total-label"> / ${tAll} solved</span>
        </div>
      </div>

      <div class="lc-bar-row">
        <span class="lc-bar-label" style="color:#00b8a3">Easy</span>
        <div class="lc-bar-track">
          <div class="lc-bar-fill" style="width:${pctE}%;background:#00b8a3"></div>
        </div>
        <span class="lc-bar-count"><span style="color:#00b8a3;font-weight:600">${easy}</span> / ${tEasy}</span>
      </div>

      <div class="lc-bar-row">
        <span class="lc-bar-label" style="color:#ffc01e">Medium</span>
        <div class="lc-bar-track">
          <div class="lc-bar-fill" style="width:${pctM}%;background:#ffc01e"></div>
        </div>
        <span class="lc-bar-count"><span style="color:#ffc01e;font-weight:600">${med}</span> / ${tMed}</span>
      </div>

      <div class="lc-bar-row">
        <span class="lc-bar-label" style="color:#ef4743">Hard</span>
        <div class="lc-bar-track">
          <div class="lc-bar-fill" style="width:${pctH}%;background:#ef4743"></div>
        </div>
        <span class="lc-bar-count"><span style="color:#ef4743;font-weight:600">${hard}</span> / ${tHard}</span>
      </div>

      <div class="lc-ranking">
        Ranking: <span class="w">#${ranking.toLocaleString()}</span>
      </div>
    `;
    output.scrollTop = output.scrollHeight;
  })
  .catch(() => {
    // Fallback to cached stats if API fails
    const el = document.getElementById(containerId);
    if (!el) return;
    el.innerHTML = `
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
        <div>
          <span class="lc-total">601</span>
          <span class="lc-total-label"> / 3878 solved</span>
        </div>
      </div>

      <div class="lc-bar-row">
        <span class="lc-bar-label" style="color:#00b8a3">Easy</span>
        <div class="lc-bar-track">
          <div class="lc-bar-fill" style="width:22.6%;background:#00b8a3"></div>
        </div>
        <span class="lc-bar-count"><span style="color:#00b8a3;font-weight:600">211</span> / 933</span>
      </div>

      <div class="lc-bar-row">
        <span class="lc-bar-label" style="color:#ffc01e">Medium</span>
        <div class="lc-bar-track">
          <div class="lc-bar-fill" style="width:16.4%;background:#ffc01e"></div>
        </div>
        <span class="lc-bar-count"><span style="color:#ffc01e;font-weight:600">332</span> / 2029</span>
      </div>

      <div class="lc-bar-row">
        <span class="lc-bar-label" style="color:#ef4743">Hard</span>
        <div class="lc-bar-track">
          <div class="lc-bar-fill" style="width:6.3%;background:#ef4743"></div>
        </div>
        <span class="lc-bar-count"><span style="color:#ef4743;font-weight:600">58</span> / 916</span>
      </div>

      <div class="lc-ranking">
        Ranking: <span class="w">#122,357</span>
        <span class="d">(cached — API unavailable)</span>
      </div>
    `;
    output.scrollTop = output.scrollHeight;
  });
}

  <span class="g">&#10003;</span> Downloading <span class="w">Piyush_Bali_Resume.pdf</span>...
</div>`;
}

function cmdClear() {
  output.innerHTML = '';
  return null;
}

// ── Helpers ──
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function append(html) {
  output.insertAdjacentHTML('beforeend', html);
  output.scrollTop = output.scrollHeight;
}

function exec(raw) {
  const cmd = raw.trim().toLowerCase();
  if (!cmd) return;

  append(`<div class="cmd-echo"><span class="g">piyush</span><span class="c">@portfolio</span><span class="y"> $ </span>${esc(raw)}</div>`);

  const resolved = ALIASES[cmd] || cmd;
  const fn = COMMANDS[resolved];

  if (fn) {
    const result = fn();
    if (result) append(`<div class="block">${result}</div><br>`);
  } else {
    append(`<div class="block"><span class="r">command not found:</span> ${esc(cmd)}<br><span class="d">Type <span class="g">help</span> to see available commands.</span></div><br>`);
  }

  output.scrollTop = output.scrollHeight;
}

// ── History ──
const history = [];
let histIdx = -1;

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = input.value;
    if (val.trim()) history.unshift(val);
    histIdx = -1;
    exec(val);
    input.value = '';
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) { histIdx++; input.value = history[histIdx]; }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; input.value = history[histIdx]; }
    else { histIdx = -1; input.value = ''; }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    const partial = input.value.trim().toLowerCase();
    if (!partial) return;
    const allCmds = [...Object.keys(COMMANDS), ...Object.keys(ALIASES)];
    const match = allCmds.filter(c => c.startsWith(partial));
    if (match.length === 1) input.value = match[0];
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    cmdClear();
  }
});

// Focus input on click anywhere
document.querySelector('.terminal').addEventListener('click', () => input.focus());

// Boot
welcome();
</script>
